<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法之光・心相應 ｜ 祝福語求籤</title>
    
    <!-- 載入 Google Fonts 思源宋體 Noto Serif TC 以及區塊 1 與 2 的字體子集 (Zhi Mang Xing 行草、Yuji Mai 流暢行書、Yuji Syuku 端莊楷書) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Zhi+Mang+Xing&family=Yuji+Mai&family=Yuji+Syuku&text=%E4%BF%A1%E9%A1%98%E8%A1%8C%E5%B8%83%E6%96%BD%E6%8C%81%E6%88%92%E5%BF%8D%E8%BE%B1%E7%B2%BE%E9%80%B2%E7%A6%AA%E5%AE%9A%E8%88%AC%E8%8B%A5&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=202605271821">
</head>
<body>

    <!-- 禪意深色背景與金色星光粒子效果 (PC端外圍) -->
    <div class="sky-background">
        <div class="stars"></div>
        <div class="glowing-orb orb-1"></div>
        <div class="glowing-orb orb-2"></div>
    </div>

    <!-- 主求籤容器 (鎖定 1817:3231 直立物理比例) -->
    <main class="app-container" id="app-container">

        <!-- 1. 首頁與求籤動畫畫面 (同一容器層疊，以實現極致無縫原地淡入) -->
        <section class="screen active" id="screen-home">
            <div class="image-wrapper">
                <!-- 首頁底圖 (高相容Picture雙備援：現代手機加載0.49MB WebP；極老舊手機自動加載1.06MB優化PNG) -->
                <picture class="bg-img">
                    <source srcset="BlessingDrawPage.webp?v=202605270947" type="image/webp">
                    <img src="BlessingDrawPage.png?v=202605270947" alt="與佛相應求籤首頁" class="bg-img" id="bg-base-img">
                </picture>
                
                <!-- 原地層疊的求籤動畫影片 (預載，預設 opacity: 0 隱藏) -->
                <video class="animation-video" id="draw-video" preload="auto" playsinline muted>
                    <source src="BlessingDraw_Animation.mp4" type="video/mp4">
                    您的瀏覽器不支援播放此影片。
                </video>

                <!-- 精確百分比定位的互動按鈕，疊加於最上層 -->
                <button class="draw-btn" id="draw-btn" aria-label="請賜籤"></button>
            </div>
        </section>

        <!-- 2. 求籤結果畫面 -->
        <section class="screen" id="screen-result">
            <div class="image-wrapper">
                <!-- 動態背景影片：循環播放、靜音、適應螢幕，並以靜態圖作為 poster 與 fallback -->
                <video class="bg-img bg-video" id="result-bg-video" loop muted playsinline poster="BlessingDrawResult_1.png?v=202605270947">
                    <source src="BlessingDrawResult_Animation_1.mp4?v=202605270947" type="video/mp4">
                    <img src="BlessingDrawResult_1.png?v=202605270947" alt="求籤結果背景" class="bg-img" id="result-bg-img">
                </video>
                
                <!-- 牌匾內區塊 1 展示區 (淨寶三資糧) -->
                <div class="blessing-block block-1" id="blessing-block-1">
                    <div class="block-content" id="block-content-1">信</div>
                </div>

                <!-- 牌匾內區塊 2 展示區 (招財六度行) -->
                <div class="blessing-block block-2" id="blessing-block-2">
                    <div class="block-content" id="block-content-2">布施</div>
                </div>

                <!-- 牌匾內區塊 3 展示區 (經典祝福法語) -->
                <div class="blessing-block block-3" id="blessing-block-3">
                    <div class="block-content" id="block-content-3">
                        老和尚祝福你們，要想有智慧、福德、無量壽，這是果喔！因從哪裡來呢？「智慧福德無量壽，悉從精進法中來」，你不精進，這些果就沒有。
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 載入祝福語資料與主控邏輯 (顯式指定 UTF-8 編碼，防止 Windows 本地端載入亂碼) -->
    <script src="blessings.js?v=202605270947" charset="UTF-8"></script>
    <script src="app.js?v=202605270947" charset="UTF-8"></script>
</body>
</html>
